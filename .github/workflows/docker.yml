---
name: Ansible Docker Image

'on':
  push:
    paths:
      - Dockerfile
      - install.sh
      - VERSION

  pull_request:
    paths:
      - Dockerfile
      - install.sh
      - VERSION

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Grab the version to use.
        id: v1
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Grab the timestamp to use.
        id: v2
        run: echo "timestamp=$(cat GITHUB_SHA:0:12)" >> $GITHUB_OUTPUT

      - name: Build the Docker Image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            ANSIBLE_VERSION=${{ steps.v1.outputs.version }}
          tags: dcjulian29/ansible:${{ steps.v1.outputs.version }}-${{ steps.v2.outputs.timestamp }}

  release:
    if: contains(github.ref, 'tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Login to DockerHub.
        uses: docker/login-action@v4
        with:
          username: dcjulian29
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Grab the version to use.
        id: v1
        run: echo "version=$(cat ${{ github.workspace }}/VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            ANSIBLE_VERSION=${{ steps.v1.outputs.version }}
          push: true
          tags: dcjulian29/ansible:${{ steps.v1.outputs.version }},dcjulian29/ansible:latest
